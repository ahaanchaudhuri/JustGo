<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JustGo - URL Shortcuts Settings</title>
    <link rel="stylesheet" href="../css/options.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="../icons/logo128.png" alt="JustGo Logo" class="logo">
            <h1>JustGo</h1>
            <p>Quick shortcuts to your favorite sites</p>
        </div>
        <div class="content">
            <div id="message" class="message"></div>
            
            <div class="toolbar">
                <button class="btn btn-secondary" id="exportBtn">Export JSON</button>
                <button class="btn btn-secondary" id="importBtn">Import JSON</button>
                <input type="file" id="fileInput" accept=".json" style="display: none;">
            </div>
            
            <div class="add-form">
                <form id="addForm">
                    <div class="form-group">
                        <label for="shortcutHost">Shortcut Name</label>
                        <input 
                            type="text" 
                            id="shortcutHost" 
                            placeholder="e.g. YouTube"
                            required
                            aria-required="true"
                        >
                        <div class="form-hint" id="hostHint"></div>
                    </div>
                    <div class="form-group">
                        <label for="destinationUrl">Destination URL</label>
                        <input 
                            type="text" 
                            id="destinationUrl" 
                            placeholder="e.g. https://youtube.com"
                            required
                            aria-required="true"
                        >
                        <div class="form-hint">Protocol will be added automatically if missing</div>
                    </div>
                    <button type="submit" class="btn btn-primary" id="addBtn">Add Shortcut</button>
                </form>
            </div>

            <div class="mappings-section">
                <h2>My Shortcuts</h2>
                <div id="mappingsContainer">
                    <div class="shortcuts-list" id="shortcutsList"></div>
                    <div id="emptyState" class="empty-state">
                        <div class="empty-state-icon">🔗</div>
                        <p>No shortcuts yet. Add your first shortcut above!</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="../js/utils.js"></script>
    <script src="../js/options.js"></script>
</body>
</html>
