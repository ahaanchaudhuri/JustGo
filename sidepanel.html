<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JustGo - Shortcuts</title>
    <link rel="stylesheet" href="options.css">
    <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="icons/logo128.png" alt="JustGo Logo" class="logo">
            <h1>JustGo Shortcuts</h1>
            <p>Quick access to your shortcuts</p>
        </div>
        <div class="content">
            <div id="message" class="message"></div>
            
            <div class="add-form">
                <form id="addForm">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="shortcutHost">Shortcut Host</label>
                            <input 
                                type="text" 
                                id="shortcutHost" 
                                placeholder="e.g., frontend.dev, docs" 
                                required
                            >
                            <div class="form-hint" id="hostHint"></div>
                        </div>
                        <div class="form-group">
                            <label for="destinationUrl">Destination URL</label>
                            <input 
                                type="text" 
                                id="destinationUrl" 
                                placeholder="http://localhost:5173/" 
                                required
                            >
                            <div class="form-hint">Protocol added automatically if missing</div>
                        </div>
                        <button type="submit" class="btn btn-primary">Add Shortcut</button>
                    </div>
                </form>
            </div>

            <div class="mappings-section">
                <h2>Your Shortcuts</h2>
                <div id="mappingsContainer">
                    <table class="mappings-table" id="mappingsTable" style="display: none;">
                        <thead>
                            <tr>
                                <th>Shortcut</th>
                                <th>URL</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="mappingsTableBody">
                        </tbody>
                    </table>
                    <div id="emptyState" class="empty-state">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
                        </svg>
                        <p>No shortcuts yet. Add your first shortcut above!</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="utils.js"></script>
    <script src="sidepanel.js"></script>
</body>
</html>
